{% extends "base.html" %}

{% block title %}홈 - 약쏙{% endblock %}

{% block header_sub %}
<p class="header-desc">안녕하세요, {{ user.name }}님</p>
{% endblock %}

{% block content %}
<section class="home-card">
    <h2 class="auth-title">내 약 관리</h2>
    <p class="home-message">현재 등록된 약이 없습니다.</p>
    <p class="form-hint">처방전 OCR·약 목록 기능은 다음 단계에서 추가됩니다.</p>

    <form method="post" action="{% url 'logout' %}" class="logout-form">
        {% csrf_token %}
        <button type="submit" class="btn btn-secondary btn-full">로그아웃</button>
    </form>
</section>
{% endblock %}
