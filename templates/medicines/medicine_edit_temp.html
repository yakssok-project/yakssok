{% extends 'medicines/base_app.html' %}
{% load static %}

{% block title %}약 정보 수정 - 약쏙{% endblock %}
{% block header_title %}약 추가하기{% endblock %}

{% block content %}
<section class="medicine-edit-page">
  <div class="preview-steps">
    <span></span>
    <span></span>
    <span class="active"></span>
    <span></span>
    <span></span>
  </div>

  <h2 class="ocr-result-title">약물 정보를 수정할게요</h2>

  <form method="post" action="{% url 'medicine_edit_temp' index %}">
    {% csrf_token %}

    <div class="edit-medicine-card">
      <div class="edit-medicine-image"></div>
      <strong>{{ med.name }}</strong>
    </div>

    <div class="edit-row">
      <span>하루에</span>
      <button type="button" class="count-btn" data-target="frequency" data-delta="-1">−</button>
      <input type="number" name="frequency" id="frequency" value="{{ med.frequency|default:1 }}" min="1">
      <strong>번</strong>
      <button type="button" class="count-btn" data-target="frequency" data-delta="1">＋</button>
      <span>먹어요</span>
    </div>

    <div class="edit-row">
      <button type="button" class="count-btn" data-target="duration" data-delta="-1">−</button>
      <input type="number" name="duration" id="duration" value="{{ med.duration|default:1 }}" min="1">
      <strong>일</strong>
      <button type="button" class="count-btn" data-target="duration" data-delta="1">＋</button>
      <span>일 동안 먹어요</span>
    </div>

    <button type="submit" class="ocr-add-btn edit-submit-btn">수정 완료</button>
  </form>
</section>
{% endblock %}

{% block extra_js %}
<script>
  document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll(".count-btn").forEach(function (btn) {
      btn.addEventListener("click", function () {
        const input = document.getElementById(btn.dataset.target);
        const delta = Number(btn.dataset.delta);
        const next = Math.max(1, Number(input.value || 1) + delta);
        input.value = next;
      });
    });
  });
</script>
{% endblock %}
