{% load static %}
<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{% block title %}약쏙{% endblock %}</title>

    <!-- 공통 CSS -->
    <link rel="stylesheet" href="{% static 'medicines/css/common.css' %}" />

    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>

    {% block extra_css %}{% endblock %}
  </head>

  <body class="app-page {% block body_class %}{% endblock %}">
    <div class="app-shell">
      <!-- 헤더 -->
      <header class="app-header">
        {% block header %}

        <a
          href="{% block header_back_url %}{% url 'home' %}{% endblock %}"
          class="header-back"
          aria-label="뒤로가기"
        >
          ‹
        </a>

        <h1 class="app-header-title">
          {% block header_title %}약쏙{% endblock %}
        </h1>

        <span class="header-spacer" aria-hidden="true"></span>

        {% endblock %}
      </header>

      <!-- 메인 -->
      <main class="app-main">{% block content %}{% endblock %}</main>

      <!-- 하단 네비 -->
      {% include 'medicines/includes/bottom_nav.html' %}
    </div>

    {% block extra_js %}{% endblock %}

    <!-- Lucide Icon Render -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        lucide.createIcons();
      });
    </script>
  </body>
</html>
